name: pocketfiles
description: "A simple and clean file organizer app."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^8.1.2
  path_provider: ^2.1.2
  sqflite: ^2.3.3
  open_filex: ^4.3.4
  crypto: ^3.0.7
  bcrypt: ^1.1.3
  path: ^1.9.1
  reorderable_grid: ^1.0.13
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  sqflite_common_ffi: ">=2.3.0 <2.4.0"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png